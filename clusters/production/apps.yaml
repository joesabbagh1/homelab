---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-repos
  namespace: flux-system
spec:
  interval: 1h
  path: ./infrastructure/helm # for repos
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cnpg-operator
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-repos
  interval: 1h
  path: ./apps/production/cnpg
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-operator
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-repos
  interval: 1h
  path: ./apps/production/external-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: external-secrets
      namespace: external-secrets
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-repos
    - name: cnpg-operator
    - name: external-secrets-operator
  interval: 1m
  path: ./apps/production
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
# KubeVirt operator — installs CRDs before any VM resources are applied
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubevirt
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/production/kubevirt
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: kubevirt.io/v1
      kind: KubeVirt
      name: kubevirt
      namespace: kubevirt
  timeout: 10m
---
# CDI operator — installs DataVolume CRDs before VMs are applied
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cdi
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/production/cdi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # Note: no healthCheck — CDI CR status stays 'Unknown' during upgrades
  # which would permanently block the vms kustomization

---
# KubeVirt Manager web UI — depends on KubeVirt CRDs being present
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubevirt-manager
  namespace: flux-system
spec:
  dependsOn:
    - name: kubevirt
  interval: 1h
  path: ./apps/production/kubevirt-manager
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
# VM workloads — depends on both KubeVirt (VM CRDs) and CDI (DataVolume CRDs)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vms
  namespace: flux-system
spec:
  dependsOn:
    - name: kubevirt
    - name: cdi
  interval: 1h
  path: ./apps/production/vms
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
