# TLS via cert-manager (Cloudflare DNS-01). Traefik IngressRoute; local-only.
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: registry-long-timeout
  namespace: registry
spec:
  forwardingTimeouts:
    readTimeout: 15m
    idleConnTimeout: 15m
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: registry-tls
  namespace: registry
spec:
  secretName: registry-tls
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
  dnsNames:
    - registry.joesabbagh.com
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: registry
  namespace: registry
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`registry.joesabbagh.com`)
      kind: Rule
      services:
        - name: registry-docker-registry
          port: 5000
          serversTransport: registry-long-timeout
  tls:
    secretName: registry-tls
