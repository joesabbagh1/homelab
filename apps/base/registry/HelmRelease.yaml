apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: registry
  namespace: registry
spec:
  interval: 1h
  chart:
    spec:
      chart: docker-registry
      version: ">=2.0.0"
      sourceRef:
        kind: HelmRepository
        name: twuni
        namespace: flux-system
  values:
    # Optional base values, persistence disabled by default in generic helm charts
    # can be enabled later
    replicaCount: 1
    persistence:
      enabled: true
      existingClaim: registry-data-pvc
    nodeSelector:
      kubernetes.io/hostname: node2

