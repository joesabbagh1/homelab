apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openclaw-credentials
  namespace: openclaw
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: openclaw-credentials
    creationPolicy: Owner
  data:
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: secret/data/openclaw # Vault KV v2 paths require 'data' in the path when accessed via some clients, but ESO Vault provider handles it automatically if configured with version v2. Let's use standard path.
        property: GEMINI_API_KEY
    - secretKey: OPENCLAW_GATEWAY_TOKEN
      remoteRef:
        key: secret/openclaw
        property: OPENCLAW_GATEWAY_TOKEN
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: secret/openclaw
        property: TELEGRAM_BOT_TOKEN
