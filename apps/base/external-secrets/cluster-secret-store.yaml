apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault-active.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        # For initial setup, we will use a Vault token.
        # You will need to create a Kubernetes Secret named 'vault-token' in 'external-secrets'
        # namespace with key 'token' containing your Vault token.
        tokenSecretRef:
          name: vault-token
          key: token
          namespace: external-secrets
