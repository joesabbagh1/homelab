---
# Windows 10 ISO — uploaded from your laptop using virtctl image-upload
# CDI creates the PVC and waits; virtctl streams the ISO into it.
#
# After committing this and letting Flux apply it, run:
#   virtctl image-upload \
#     --image-path=/path/to/Win10.iso \
#     --pvc-name=win10-iso \
#     --pvc-size=8Gi \
#     --namespace=vms \
#     --storage-class=local-path \
#     --access-mode=ReadWriteOnce \
#     --insecure
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: win10-iso
  namespace: vms
spec:
  source:
    upload: {}
  pvc:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 8Gi
    storageClassName: local-path
    volumeMode: Filesystem
---
# VirtIO drivers ISO — public URL, no changes needed
# Required for Windows to see the disk and NIC during installation
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: virtio-win-iso
  namespace: vms
spec:
  source:
    http:
      url: "https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/virtio-win.iso"
  pvc:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
    storageClassName: local-path
    volumeMode: Filesystem
---
# Blank boot disk — Windows will install onto this
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: win10-disk
  namespace: vms
spec:
  source:
    blank: {}
  pvc:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 60Gi
    storageClassName: local-path
    volumeMode: Filesystem
