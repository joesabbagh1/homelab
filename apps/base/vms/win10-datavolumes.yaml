---
# NOTE: win10-iso PVC is managed manually (created via `virtctl image-upload`).
# It is NOT managed by Flux — CDI's webhook blocks DataVolume spec updates
# once a DataVolume has been created. The PVC exists in the cluster with the ISO data.

---
# VirtIO drivers ISO — downloaded automatically by CDI
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: virtio-win-iso
  namespace: vms
spec:
  source:
    http:
      url: "https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/virtio-win.iso"
  pvc:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
    storageClassName: local-path
    volumeMode: Filesystem
---
# Blank boot disk — Windows installs onto this
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: win10-disk
  namespace: vms
spec:
  source:
    blank: {}
  pvc:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 60Gi
    storageClassName: local-path
    volumeMode: Filesystem
