---
# Windows 10 VirtualMachine
#
# PHASE 1 — INSTALLATION (current state):
#   Boot via VNC: virtctl vnc win10-01 -n vms
#   When installer asks for disk driver: Load driver → VirtIO CDROM → vioscsi\w10\amd64
#   Complete Windows installation.
#   Inside Windows: run virtio-win-gt-x64.msi (from VirtIO CDROM) to install all drivers.
#   Enable RDP: Settings → System → Remote Desktop → On
#
# PHASE 2 — POST-INSTALL:
#   Once Windows is installed and RDP works, remove the two CDROM sections below
#   (win10-iso and virtio-iso disks + their volumes) and commit. Flux will
#   restart the VM without the ISOs attached.
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: win10-01
  namespace: vms
  labels:
    app: win10-01
spec:
  running: true
  template:
    metadata:
      labels:
        app: win10-01
    spec:
      domain:
        cpu:
          cores: 4
          sockets: 1
          threads: 1
        memory:
          guest: 4Gi
        resources:
          requests:
            memory: 4Gi
        # q35 chipset is required for Windows — supports PCIe and UEFI
        machine:
          type: q35
        firmware:
          bootloader:
            bios: {}   # set true later if desired
        features:
          acpi: {}
          apic: {}
          smm:
            enabled: true   # required for UEFI/Secure Boot
          hyperv:
            # HyperV enlightenments — improve Windows performance significantly
            relaxed:
              enabled: true
            vapic:
              enabled: true
            vpindex:
              enabled: true
            spinlocks:
              enabled: true
              spinlocks: 8191
            synic:
              enabled: true
            synictimer:
              enabled: true
              direct:
                enabled: true
            tlbflush:
              enabled: true
            frequencies:
              enabled: true
            reenlightenment:
              enabled: true
            ipi:
              enabled: true
        clock:
          utc: {}
          timer:
            hpet:
              present: false
            pit:
              tickPolicy: delay
            rtc:
              tickPolicy: catchup
            hyperv: {}
        devices:
          disks:
            # ── Boot disk (keep forever) ──────────────────────────────────
            - name: bootdisk
              bootOrder: 2
              disk:
                bus: virtio
            # ── INSTALLATION ONLY — remove these two after Windows install ──
            - name: win10-iso
              bootOrder: 1
              cdrom:
                bus: sata
                readonly: true
            # VirtIO drivers ISO — load during Windows installer
            - name: virtio-iso
              cdrom:
                bus: sata
                readonly: true
          interfaces:
            - name: default
              model: virtio
              masquerade: {}
          # Tablet gives better mouse tracking in VNC console
          inputs:
            - type: tablet
              bus: usb
              name: tablet
          rng: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: bootdisk
          dataVolume:
            name: win10-disk
        - name: win10-iso
          dataVolume:
            name: win10-iso
        - name: virtio-iso
          dataVolume:
            name: virtio-win-iso
