---
# RDP access for VM 02
apiVersion: v1
kind: Service
metadata:
  name: win10-02-rdp
  namespace: vms
  labels:
    app: win10-02
spec:
  type: LoadBalancer
  loadBalancerClass: io.cilium/l2-announcer
  selector:
    app: win10-02
  ports:
    - name: rdp
      port: 3389
      targetPort: 3389
      protocol: TCP
