apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: flux-system
spec:
  chart:
    spec:
      chart: cilium
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      version: "1.19.x"
  interval: 1h
  targetNamespace: kube-system
  values:
    ipam:
      mode: "kubernetes"

    routingMode: "tunnel"
    tunnelProtocol: "vxlan"
    autoDirectNodeRoutes: false
    ipv4NativeRoutingCIDR: "" # Ensure this is empty

    extraConfig:
      tunnel: "vxlan"

    # Lower MTU to allow room for VXLAN headers
    mtu: 1400

    # devices is intentionally NOT set — Cilium auto-detects per node via default route:
    #   node1: default route → enx6c6e07288954 (USB NIC, 192.168.0.10)
    #   node2/3: default route → enp1s0 (PCIe NIC)
    # WARNING: node1 has a boot-timing bug — USB NIC initializes after Cilium starts at
    # cold boot, causing Cilium to pick the downed enp1s0 instead. Fix: configure
    # systemd-networkd-wait-online on node1 to wait for enx6c6e07288954 specifically.

    # --- L2 & KUBE-PROXY ---
    kubeProxyReplacement: "true"
    bpf:
      masquerade: true
    l2announcements:
      enabled: true
    socketLB:
      hostNamespaceOnly: false
    k8sServiceHost: 192.168.0.10
    k8sServicePort: 6443

    # Disable XDP acceleration — tg3 (Broadcom Tigon3) driver does not support
    # hardware XDP and will panic/reset the link if Cilium tries to attach XDP programs.
    loadBalancer:
      acceleration: disabled

    debug:
      enabled: false
