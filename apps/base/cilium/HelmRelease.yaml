apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: flux-system
spec:
  chart:
    spec:
      chart: cilium
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      version: "1.19.x"
  interval: 1h
  targetNamespace: kube-system
  values:
    ipam:
      mode: "kubernetes"

    routingMode: "tunnel"
    tunnelProtocol: "vxlan"
    autoDirectNodeRoutes: false
    ipv4NativeRoutingCIDR: "" # Ensure this is empty

    extraConfig:
      tunnel: "vxlan"

    # Lower MTU to allow room for VXLAN headers
    mtu: 1400
    # Active NIC on node1 — enp1s0 (onboard) is DOWN, only USB NIC (enx+) is up.
    # Listing enp+ caused Cilium to pick the downed interface and fail with
    # "IPv4 direct routing device IP not found" → 429 on endpoint creation.
    devices: "enx+"

    # --- L2 & KUBE-PROXY ---
    kubeProxyReplacement: "true"
    bpf:
      masquerade: true
    l2announcements:
      enabled: true
    socketLB:
      hostNamespaceOnly: false
    k8sServiceHost: 192.168.0.10
    k8sServicePort: 6443

    # Disable XDP acceleration — tg3 (Broadcom Tigon3) driver does not support
    # hardware XDP and will panic/reset the link if Cilium tries to attach XDP programs.
    loadBalancer:
      acceleration: disabled

    debug:
      enabled: false
